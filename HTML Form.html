<!DOCTYPE html>
<html lang="en">
<head>
    <title>Form design </title>
</head>
<body><body bgcolor="aqua">
 
 <form>
  <table align="center" width="700" cellpadding="10">
  
  <tr>
   <td colspan="2" align="center">
     <h1>Student Registration Form</h1>
   </td>
  </tr>


 <tr>
    <td>Student name :</td>
    <td>
      <input type="text" size="21" Placeholder="First Name"/>
      -
      <input type="text" size="21" Placeholder="Last Name"/>
    </td>


  </tr>
  <tr>
    <td>Roll no :</td>
    <td><input type="text" size="50"/></td>
  </tr>

  
  <tr>
    <td>Father's name :</td>
    <td><input type="text" size="50"/></td>
  </tr>
   
  <tr>
    <td>Mother's name :</td>
    <td><input type="text" size="50"/></td>
  </tr>
  
  <tr>
    <td action="/">
        Date of birth:</td> <td> <input type="date" size=""<></td> 
  </tr>
  
  <tr>
    <td>Mobile no. :</td>
    <td>
      <input type="text" size="1" value="+91" /> -
      <input type="text" size="42" /></td>
  </tr>
  <tr>
    <td>Email id :</td>
    <td><input type="text" size="50"/></td>
  </tr>
  
  <tr>
    <td>Password :</td>
    <td><input type="password" size="50"/></td>
  </tr>
  
  <tr>
    <td>Gender :</td>
    <td>
      <input type="radio" name="g" /> Male
      <input type="radio" name="g" /> Female
      <input type="radio" name="g" /> Telapoka
    </td>
  </tr>
  
  <tr>
    <td>Department :</td>
    <td>
      <input type="checkbox" /> CST
      <input type="checkbox" /> ECE
      <input type="checkbox" /> Civil
   
      </td>
  </tr>
  
   <tr>
    <td>Student photo :</td>
    <td><input type="file" /></td>
  </tr>
  
  <tr>
    <td>City :</td>
    <td><input type="text"  size="50"/></td>
  </tr>
  
  <tr>
    <td>Address :</td>
    <td><textarea cols="48" rows="4"></textarea></td>
  </tr>
  
  
  <tr>
    <td colspan="2" align="center">
    	<input type="submit" value="Register" />
     </td>
  </tr>
  
  </table>
 </form>
    
</body>
</html>
